<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In &middot; Boston House Price Prediction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2545;
    --navy-deep:#081b34;
    --blue-line-soft:rgba(93,138,168,0.35);
    --cream:#F4EFE2;
    --ink:#142433;
    --brass:#C9972B;
    --brass-dark:#a97c1e;
    --err:#9C3B3B;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background-color:var(--navy);
    background-image:
      radial-gradient(ellipse 900px 600px at 12% 8%, rgba(78,126,166,0.35), transparent 60%),
      radial-gradient(ellipse 800px 700px at 88% 92%, rgba(201,151,43,0.14), transparent 55%),
      repeating-linear-gradient(0deg, var(--blue-line-soft) 0, var(--blue-line-soft) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(90deg, var(--blue-line-soft) 0, var(--blue-line-soft) 1px, transparent 1px, transparent 32px),
      linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
    font-family:'JetBrains Mono', monospace;
    color:var(--cream);
    padding:24px;
  }

  .auth-card{
    width:100%;
    max-width:400px;
    background:var(--cream);
    color:var(--ink);
    border-radius:8px;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
    overflow:hidden;
    animation:fadeUp .5s ease both;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  .auth-head{
    padding:26px 30px 18px;
    border-bottom:2px solid var(--ink);
  }

  .eyebrow{
    display:inline-block;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--brass-dark);
    margin-bottom:10px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:24px;
    margin:0;
    color:var(--navy);
  }

  form{ padding:24px 30px 30px; }

  .field{ margin-bottom:16px; }

  .field label{
    display:block;
    font-size:12px;
    font-weight:700;
    letter-spacing:.03em;
    margin-bottom:6px;
    color:var(--ink);
  }

  .field input{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    padding:10px 12px;
    border:1px solid rgba(20,36,51,0.35);
    border-radius:4px;
    background:#fff;
    color:var(--ink);
  }

  .field input:focus{
    outline:none;
    border-color:var(--brass);
    box-shadow:0 0 0 3px rgba(201,151,43,0.25);
  }

  button.submit{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    font-size:13px;
    background:linear-gradient(135deg, var(--navy) 0%, #123a63 100%);
    color:#fff;
    border:none;
    padding:14px;
    border-radius:5px;
    cursor:pointer;
    margin-top:6px;
    box-shadow:0 8px 20px rgba(11,37,69,0.35);
    transition:transform .15s ease, background .25s ease;
  }

  button.submit:hover{
    background:linear-gradient(135deg, var(--brass-dark) 0%, var(--brass) 100%);
    transform:translateY(-2px);
  }

  .switch-link{
    text-align:center;
    margin-top:18px;
    font-size:12.5px;
    color:#6b6152;
  }

  .switch-link a{
    color:var(--brass-dark);
    font-weight:700;
    text-decoration:none;
    border-bottom:1px solid var(--brass-dark);
  }

  .error-box{
    background:rgba(156,59,59,0.1);
    border:1px solid rgba(156,59,59,0.4);
    color:var(--err);
    font-size:12.5px;
    padding:10px 12px;
    border-radius:4px;
    margin-bottom:18px;
  }
</style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-head">
      <span class="eyebrow">Boston Housing Valuation</span>
      <h1>Log In</h1>
    </div>
    <form method="post" action="{{ url_for('login') }}">
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="submit">Log In</button>

      <p class="switch-link">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
      </p>
    </form>
  </div>
</body>
</html>
